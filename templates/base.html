<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script>
            (function() {
                var t = localStorage.getItem('theme') || 'light';
                if (t === 'dark') document.documentElement.classList.add('dark');
            })();
        </script>
        {{if .debug}}
        <link rel="stylesheet/less" href="/static/style.less">
        <script src="/static/js/less.min.js"></script>
        {{else}}
        <link rel="stylesheet" href="/static/style.css">
        {{end}}
        <script src="/static/js/cash.min.js"></script>
        <script src="/static/js/app.js" defer></script>
        <title>{{if .title}}{{.title}} — Giverny{{else}}Giverny{{end}}</title>
    </head>
    <body>
        <header>
            <nav>
                <a href="/" class="logo">Giverny</a>
                {{if .user}}
                <a href="/boards/" class="nav-link">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>boards</span>
                </a>
                {{if .user.IsAdmin}}
                <a href="/labels/" class="nav-link">
                    <i class="fa-solid fa-tags"></i>
                    <span>labels</span>
                </a>
                {{end}}
                {{if .user.IsSuperAdmin}}
                <a href="/admin/users/" class="nav-link">
                    <i class="fa-solid fa-users"></i>
                    <span>users</span>
                </a>
                {{end}}
                {{end}}
                <div class="nav-right">
                    {{if .user}}
                    <i class="fa-solid fa-magnifying-glass nav-icon" title="search"></i>
                    <i class="fa-solid fa-bell nav-icon" title="notifications"></i>
                    <div class="user-menu-wrap">
                        <button class="user-menu-trigger" id="user-menu-trigger">
                            {{if .user.ProfileImageURI}}<img class="avatar" src="{{.user.ProfileImageURI}}" alt="">{{end}}
                            <span>{{.user.Username}}</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="user-dropdown" id="user-dropdown">
                            <a href="/settings/" class="dropdown-item">
                                <i class="fa-solid fa-gear dropdown-icon"></i>
                                <span class="dropdown-label">settings</span>
                            </a>
                            <button class="dropdown-item" id="theme-toggle">
                                <i class="fa-regular fa-sun dropdown-icon"></i>
                                <i class="fa-solid fa-moon dropdown-icon"></i>
                                <span class="theme-toggle-pill"></span>
                            </button>
                            <a href="/logout/" class="dropdown-item">
                                <i class="fa-solid fa-right-from-bracket dropdown-icon"></i>
                                <span class="dropdown-label">logout</span>
                            </a>
                        </div>
                    </div>
                    {{else}}
                    <button class="theme-toggle-nav" id="theme-toggle" title="toggle theme">
                        <i class="fa-regular fa-sun"></i>
                        <i class="fa-solid fa-moon"></i>
                        <span class="theme-toggle-pill"></span>
                    </button>
                    <a href="/login/">login</a>
                    {{end}}
                </div>
            </nav>
        </header>
        <main{{if .mainClass}} class="{{.mainClass}}"{{end}}>
            {{.body}}
        </main>
        <div id="confirm-modal" class="modal-overlay">
            <div class="modal">
                <p id="confirm-message"></p>
                <div class="modal-actions">
                    <button id="confirm-cancel">cancel</button>
                    <button id="confirm-ok" class="danger">confirm</button>
                </div>
            </div>
        </div>
    </body>
</html>

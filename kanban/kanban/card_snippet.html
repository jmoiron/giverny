<div class="kanban-card{{if .card.Color}} has-card-color{{end}}" data-id="{{.card.ID}}"{{if .draggable}} draggable="true"{{end}} data-card-color="{{.card.Color}}"{{if .card.Color}} style="--card-color: {{.card.Color}}"{{end}}>
    <div class="card-title">{{.card.Title}}</div>
    <div class="kanban-card-checklist-progress-slot{{if not .card.ChecklistTotal}} is-empty{{end}}">
        <div class="kanban-card-checklist-progress{{if .card.Color}} has-card-color{{end}}"{{if not .card.ChecklistTotal}} hidden{{end}}{{if .card.Color}} style="--card-color: {{.card.Color}}"{{end}}>
            <span class="kanban-card-checklist-copy">{{.card.ChecklistDone}}/{{.card.ChecklistTotal}} {{.card.ChecklistPct}}%</span>
            <span class="kanban-card-checklist-bar">
                <span class="kanban-card-checklist-fill" style="width: {{.card.ChecklistPct}}%;"></span>
            </span>
        </div>
    </div>
    {{if .card.Labels}}
    <div class="card-labels">
        {{range .card.Labels}}
        <span class="label-pill {{.TextClass}}" data-label-id="{{.ID}}" style="--label-color: {{.Color}}" title="{{.Description}}">{{.Title}}</span>
        {{end}}
    </div>
    {{end}}
</div>
